# ==============================
# Vuln Art Shop - Admin VHOST (admin.vulnart.local)
# CTF: Only discoverable via DNS/vhost enumeration
# ==============================

server {
    listen 80;
    server_name admin.vulnart.local;

    # CTF: Different server header to hint at different service
    add_header X-Powered-By "VulnArt-Admin/2.0.0" always;
    add_header X-Backend "admin-service" always;

    location / {
        proxy_pass http://admin-vhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Admin API - separate endpoints
    location /api/admin/ {
        proxy_pass http://admin-vhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
