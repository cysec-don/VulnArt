# ==============================
# Vuln Art Shop - Docker Compose
# Multi-container CTF Lab Environment
# ==============================

version: '3.8'

services:
  # ---- Main Web Application ----
  web:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: vulnart-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://vulnart:vulnart_pass_2024@postgres:5432/vulnart
      - NODE_ENV=production
      - SECRET_KEY=vuln_art_secret_2024
      - NEXT_PUBLIC_APP_NAME=Vuln Art Shop
      - ADMIN_EMAIL=mike@vulnart.shop
      - VIRTUAL_HOST=vulnart.local
      - VIRTUAL_PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vulnart-network

  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    container_name: vulnart-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=vulnart
      - POSTGRES_PASSWORD=vulnart_pass_2024
      - POSTGRES_DB=vulnart
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnart"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vulnart-network

  # ---- Nginx Reverse Proxy (VHOST Support) ----
  nginx:
    image: nginx:alpine
    container_name: vulnart-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/vhosts:/etc/nginx/vhosts:ro
    depends_on:
      - web
    networks:
      - vulnart-network

  # ---- Admin VHOST (admin.vulnart.local) ----
  admin-vhost:
    build:
      context: ../
      dockerfile: docker/Dockerfile.admin-vhost
    container_name: vulnart-admin-vhost
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://vulnart:vulnart_pass_2024@postgres:5432/vulnart
      - NODE_ENV=production
      - SECRET_KEY=vuln_art_secret_2024
      - VIRTUAL_HOST=admin.vulnart.local
    depends_on:
      - postgres
    networks:
      - vulnart-network

  # ---- Dev VHOST (dev.vulnart.local) ----
  dev-vhost:
    build:
      context: ../
      dockerfile: docker/Dockerfile.dev-vhost
    container_name: vulnart-dev-vhost
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://vulnart:vulnart_pass_2024@postgres:5432/vulnart
      - NODE_ENV=development
      - SECRET_KEY=vuln_art_secret_2024
      - VIRTUAL_HOST=dev.vulnart.local
    depends_on:
      - postgres
    networks:
      - vulnart-network

  # ---- Staging VHOST (staging.vulnart.local) ----
  staging-vhost:
    build:
      context: ../
      dockerfile: docker/Dockerfile.staging-vhost
    container_name: vulnart-staging-vhost
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://vulnart:vulnart_pass_2024@postgres:5432/vulnart
      - NODE_ENV=staging
      - SECRET_KEY=vuln_art_secret_2024
      - VIRTUAL_HOST=staging.vulnart.local
    depends_on:
      - postgres
    networks:
      - vulnart-network

volumes:
  postgres-data:
    driver: local

networks:
  vulnart-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
