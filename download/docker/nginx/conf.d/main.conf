# ==============================
# Vuln Art Shop - Main Site (vulnart.local)
# ==============================

server {
    listen 80;
    server_name vulnart.local www.vulnart.local;

    # CTF: Information disclosure header
    add_header X-Powered-By "VulnArt/1.0.0" always;
    add_header X-Server "nginx/1.25" always;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve hidden files from public directory (CTF discovery)
    location /hidden/ {
        alias /usr/share/nginx/html/hidden/;
        autoindex off;  # No directory listing by default
    }

    location /secret-files/ {
        alias /usr/share/nginx/html/secret-files/;
        autoindex off;
    }

    location /backup/ {
        alias /usr/share/nginx/html/backup/;
        autoindex off;
    }

    # CTF: Exposed .env file
    location = /.env {
        root /usr/share/nginx/html;
        default_type text/plain;
    }

    # CTF: robots.txt is served normally
    location = /robots.txt {
        root /usr/share/nginx/html;
        default_type text/plain;
    }
}
