# ==============================
# Vuln Art Shop - Dev VHOST (dev.vulnart.local)
# CTF: Exposes debug info and stack traces
# ==============================

server {
    listen 80;
    server_name dev.vulnart.local;

    # CTF: Verbose headers revealing dev environment
    add_header X-Powered-By "VulnArt-Dev/0.9.0-beta" always;
    add_header X-Environment "development" always;
    add_header X-Debug-Mode "enabled" always;
    add_header X-Stack-Trace "on" always;

    location / {
        proxy_pass http://dev-vhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Dev environment info endpoint
    location /api/dev-info {
        proxy_pass http://dev-vhost:3002/api/dev-info;
        proxy_set_header Host $host;
    }
}
