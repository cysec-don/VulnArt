# ==============================
# Vuln Art Shop - Staging VHOST (staging.vulnart.local)
# CTF: Has different data, API docs, and test credentials
# ==============================

server {
    listen 80;
    server_name staging.vulnart.local;

    add_header X-Powered-By "VulnArt-Staging/1.0.0-rc1" always;
    add_header X-Environment "staging" always;

    location / {
        proxy_pass http://staging-vhost:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API documentation exposed on staging
    location /api-docs {
        proxy_pass http://staging-vhost:3003/api-docs;
        proxy_set_header Host $host;
    }

    # Swagger UI on staging
    location /swagger {
        proxy_pass http://staging-vhost:3003/swagger;
        proxy_set_header Host $host;
    }
}
